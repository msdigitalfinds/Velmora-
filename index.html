<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velmora Luxury | Ultra Premium Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --gray: #1a1a1a; --white: #ffffff; --border: #333; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--white); scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 24px; font-weight: bold; text-decoration: none; color: white; }
        .logo span { color: var(--gold); }
        .nav-tools { display: flex; gap: 15px; align-items: center; }
        
        input, select { padding: 8px 15px; border-radius: 20px; border: 1px solid #444; background: #111; color: #fff; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }

        /* Hero */
        .hero { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1513584684374-8bdb74a9fe2f?w=1400'); background-size: cover; background-position: center; }
        
        /* Main Section */
        .container { padding: 30px 5%; }
        .filter-section { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; align-items: center; background: #111; padding: 20px; border-radius: 10px; border: 1px solid var(--border); }
        
        .tabs { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; flex-grow: 1; }
        .tab { padding: 8px 20px; background: #1a1a1a; cursor: pointer; border-radius: 30px; border: 1px solid var(--border); white-space: nowrap; font-size: 14px; }
        .tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
        
        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .card { background: #111; border-radius: 15px; overflow: hidden; position: relative; border: 1px solid var(--border); transition: 0.4s; }
        .card:hover { transform: translateY(-8px); border-color: var(--gold); }
        .card img { width: 100%; height: 250px; object-fit: cover; }
        .card-content { padding: 20px; }
        
        .badge { position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.8); color: var(--gold); padding: 4px 10px; border: 1px solid var(--gold); font-size: 10px; font-weight: 600; border-radius: 3px; z-index: 2; }
        .mrp { text-decoration: line-through; color: #666; font-size: 0.85rem; }
        .price { color: var(--white); font-size: 1.3rem; font-weight: bold; margin: 5px 0; }
        .discount { color: #2ecc71; font-size: 0.85rem; font-weight: 600; margin-left: 10px; }
        
        .rating { color: #f1c40f; margin-bottom: 10px; font-size: 0.85rem; }
        .wish-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; z-index: 5; }
        .wish-btn.active { background: white; color: #e74c3c; }

        .btn-buy { display: block; background: var(--gold); color: #000; text-align: center; padding: 10px; text-decoration: none; font-weight: 600; border-radius: 5px; margin-top: 15px; font-size: 14px; }

        footer { text-align: center; padding: 40px; background: #000; border-top: 1px solid var(--border); font-size: 13px; color: #777; }
        
        .light-mode { background: #fdfdfd; color: #222; }
        .light-mode .card, .light-mode .filter-section { background: #fff; border-color: #eee; }
        .light-mode .navbar { background: #fff; color: #000; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo">Velmora <span>Luxury</span></a>
    <div class="nav-tools">
        <input type="text" id="searchInput" placeholder="Search...">
        <span id="wishCount" style="color:var(--gold); font-weight:600;">❤ 0</span>
        <button id="themeToggle" style="background:none; border:none; color:inherit; cursor:pointer;">🌙</button>
    </div>
</nav>

<section class="hero">
    <h1>The Elite Selection</h1>
    <p>Curated Luxury from ₹199 to ₹5,00,000+</p>
</section>

<div class="container">
    <div class="filter-section">
        <select id="priceFilter">
            <option value="all">All Price Ranges</option>
            <option value="199-499">₹199 - ₹499</option>
            <option value="499-899">₹499 - ₹899</option>
            <option value="999-1500">₹999 - ₹1,500</option>
            <option value="1500-2000">₹1,500 - ₹2,000</option>
            <option value="2000-2499">₹2,000 - ₹2,499</option>
            <option value="5000-10000">₹5,000 - ₹10,000</option>
            <option value="10000-15000">₹10,000 - ₹15,000</option>
            <option value="15000-30000">₹15,000 - ₹30,000</option>
            <option value="30000-100000">₹30,000 - ₹1,00,000</option>
            <option value="100000-500000">₹1,00,000 - ₹5,00,000</option>
            <option value="500000-above">Above ₹5,00,000</option>
        </select>
        
        <div class="tabs" id="categoryTabs"></div>
    </div>

    <div class="grid" id="productGrid"></div>
</div>

<footer>
    <p>© 2026 Velmora Luxury Boutique. All Rights Reserved.</p>
</footer>

<script>
// ===== 15+ PREMIUM PRODUCTS DATA =====
const products = [
    { id: 1, name: "Premium Silk Pocket Square", mrp: 999, price: 399, cat: "Accessories", img: "https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=500", badge: "Essentials" },
    { id: 2, name: "Leather Key Organizer", mrp: 1200, price: 750, cat: "Accessories", img: "https://images.unsplash.com/photo-1584917865442-de89df76afd3?w=500", badge: "Handmade" },
    { id: 3, name: "Minimalist Desk Lamp", mrp: 2500, price: 1299, cat: "Home", img: "https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=500", badge: "Modern" },
    { id: 4, name: "Luxury Scented Candle", mrp: 2999, price: 1850, cat: "Home", img: "https://images.unsplash.com/photo-1508712917326-0567a2cb43df?w=500", badge: "Trending" },
    { id: 5, name: "Full Grain Leather Wallet", mrp: 4500, price: 2200, cat: "Bags", img: "https://images.unsplash.com/photo-1627123424574-724758594e93?w=500", badge: "Pure Leather" },
    { id: 6, name: "Signature Chronograph", mrp: 15000, price: 8500, cat: "Watches", img: "https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=500", badge: "Best Seller" },
    { id: 7, name: "Noise Cancelling Headphones", mrp: 19999, price: 12499, cat: "Audio", img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500", badge: "Studio Grade" },
    { id: 8, name: "Professional DSLR Camera", mrp: 35000, price: 28999, cat: "Tech", img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=500", badge: "Top Rated" },
    { id: 9, name: "Executive Leather Briefcase", mrp: 55000, price: 42000, cat: "Bags", img: "https://images.unsplash.com/photo-1547949003-9792a18a2601?w=500", badge: "Bespoke" },
    { id: 10, name: "Masterpiece Gold Fountain Pen", mrp: 85000, price: 72000, cat: "Accessories", img: "https://images.unsplash.com/photo-1583485088034-697b5bc54ccd?w=500", badge: "Collector's Item" },
    { id: 11, name: "Limited Edition Tourbillon", mrp: 250000, price: 185000, cat: "Watches", img: "https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=500", badge: "Prestige" },
    { id: 12, name: "Designer Living Suite", mrp: 490000, price: 380000, cat: "Home", img: "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=500", badge: "Exclusive" },
    { id: 13, name: "Private Jet Membership Card", mrp: 850000, price: 650000, cat: "Lifestyle", img: "https://images.unsplash.com/photo-1540962351504-03099e0a75c3?w=500", badge: "Ultimate Luxury" },
    { id: 14, name: "Velmora Diamond Chrono", mrp: 1200000, price: 950000, cat: "Watches", img: "https://images.unsplash.com/photo-1614164185128-e4ec99c436d7?w=500", badge: "Diamond Studded" },
    { id: 15, name: "Heritage Estate Desk", mrp: 220000, price: 145000, cat: "Home", img: "https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?w=500", badge: "Vintage" }
];

let wishlist = JSON.parse(localStorage.getItem('velmora_wishlist')) || [];

function init() {
    renderTabs();
    filterProducts();
    updateWishCount();
}

function renderTabs() {
    const cats = ["All", ...new Set(products.map(p => p.cat))];
    const container = document.getElementById('categoryTabs');
    container.innerHTML = cats.map(c => `
        <div class="tab ${c === 'All' ? 'active' : ''}" onclick="setCategory(this, '${c}')">${c}</div>
    `).join('');
}

let currentCat = "All";

function setCategory(el, cat) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    currentCat = cat;
    filterProducts();
}

function filterProducts() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const priceRange = document.getElementById('priceFilter').value;
    
    let filtered = products.filter(p => {
        const matchesCat = currentCat === "All" || p.cat === currentCat;
        const matchesSearch = p.name.toLowerCase().includes(searchTerm);
        
        let matchesPrice = true;
        if (priceRange !== "all") {
            if (priceRange === "500000-above") {
                matchesPrice = p.price > 500000;
            } else {
                const [min, max] = priceRange.split('-').map(Number);
                matchesPrice = p.price >= min && p.price <= max;
            }
        }
        return matchesCat && matchesSearch && matchesPrice;
    });

    renderGrid(filtered);
}

function renderGrid(data) {
    const grid = document.getElementById('productGrid');
    if (data.length === 0) {
        grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; padding: 50px; opacity: 0.5;">No products found in this range.</p>`;
        return;
    }

    grid.innerHTML = data.map(p => {
        const isWish = wishlist.includes(p.id) ? 'active' : '';
        const discount = Math.round(((p.mrp - p.price) / p.mrp) * 100);
        
        return `
            <div class="card">
                <div class="badge">${p.badge}</div>
                <div class="wish-btn ${isWish}" onclick="toggleWish(${p.id})">❤</div>
                <img src="${p.img}" alt="${p.name}" loading="lazy">
                <div class="card-content">
                    <div class="rating">★★★★★ <span style="color:#777; font-size:12px;">(Verified)</span></div>
                    <h3 style="font-size:16px; margin: 10px 0;">${p.name}</h3>
                    <div>
                        <span class="mrp">₹${p.mrp.toLocaleString()}</span>
                        <span class="discount">${discount}% OFF</span>
                    </div>
                    <div class="price">₹${p.price.toLocaleString()}</div>
                    <a href="#" class="btn-buy">Buy Now</a>
                </div>
            </div>
        `;
    }).join('');
}

function toggleWish(id) {
    if(wishlist.includes(id)) wishlist = wishlist.filter(i => i !== id);
    else wishlist.push(id);
    localStorage.setItem('velmora_wishlist', JSON.stringify(wishlist));
    updateWishCount();
    filterProducts();
}

function updateWishCount() {
    document.getElementById('wishCount').innerText = `❤ ${wishlist.length}`;
}

// Event Listeners
document.getElementById('searchInput').addEventListener('input', filterProducts);
document.getElementById('priceFilter').addEventListener('change', filterProducts);
document.getElementById('themeToggle').addEventListener('click', () => {
    document.body.classList.toggle('light-mode');
});

init();
</script>
</body>
</html>
