<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Velmora Luxury | Premium Smartwatches, Audio & Elite Collections</title>
    <meta name="description" content="Discover Velmora Luxury's curated collection of elite essentials. Shop premium smartwatches, high-end audio, luxury stationery, and fashion accessories.">
    <meta name="keywords" content="luxury shopping, premium smartwatches, elite accessories, Velmora Luxury, high-end electronics">
    <meta name="author" content="Velmora Luxury">
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "Velmora Luxury",
      "description": "Ultra Premium Collection of Elite Essentials",
      "url": "https://yourdomain.com",
      "category": "Luxury Lifestyle"
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --gray: #1a1a1a; --white: #ffffff; --border: #333; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--white); scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 24px; font-weight: bold; text-decoration: none; color: white; }
        .logo span { color: var(--gold); }
        
        input, select { padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #111; color: #fff; outline: none; transition: 0.3s; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .hero { height: 40vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1513584684374-8bdb74a9fe2f?w=1400'); background-size: cover; background-position: center; padding: 0 10%; border-bottom: 1px solid var(--gold); }
        .hero h1 { font-size: 2rem; margin-bottom: 10px; color: var(--white); }
        .hero p { color: var(--gold); font-size: 0.9rem; max-width: 800px; font-style: italic; }
        
        .container { padding: 20px 5%; }
        .filter-section { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .search-price-row { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { padding: 8px 18px; background: #1a1a1a; cursor: pointer; border-radius: 30px; border: 1px solid var(--border); white-space: nowrap; font-size: 12px; color: #ccc; transition: 0.3s; }
        .tab.active { background: var(--gold); color: #000; font-weight: 600; border-color: var(--gold); }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; position: relative; }
        
        .wishlist-btn { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.5); border: none; color: white; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; z-index: 10; font-size: 16px; transition: 0.3s; }
        .wishlist-btn.active { color: #ff4757; }

        .card img { width: 100%; height: 150px; object-fit: cover; }
        .card-content { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .smart-message { font-size: 10px; background: rgba(212, 175, 55, 0.1); color: var(--gold); padding: 8px; border-left: 3px solid var(--gold); margin-bottom: 10px; border-radius: 0 4px 4px 0; line-height: 1.4; min-height: 40px; }

        .rating { color: var(--gold); font-size: 10px; margin-bottom: 5px; }
        
        .card-content h3 { font-size: 13px; margin: 5px 0; color: var(--white); height: 36px; overflow: hidden; }
        .price { color: var(--gold); font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; }
        .btn-buy { display: block; background: var(--gold); color: #000; text-align: center; padding: 10px; text-decoration: none; font-weight: 600; border-radius: 8px; font-size: 11px; margin-top: auto; }

        /* Related Section Label */
        .related-tag { font-size: 9px; color: var(--gold); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; opacity: 0.8; }

        footer { text-align: center; padding: 30px; background: #000; font-size: 11px; color: #555; border-top: 1px solid var(--border); }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo">Velmora <span>Luxury</span></a>
</nav>

<section class="hero">
    <h1>Velmora brings together performance, elegance, and distinction
in a collection designed for the modern achiever.</p>
</section>

<div class="container">
    <div class="filter-section">
        <div class="search-price-row">
            <input type="text" id="searchInput" placeholder="Search elite products...">
            <select id="priceRange">
                <option value="all">Price: All</option>
                <option value="199-1000">₹199 - ₹1,000</option>
                <option value="1000-5000">₹1,000 - ₹5,000</option>
                <option value="5000-above">Above ₹5,000</option>
            </select>
        </div>
        <div class="tabs" id="categoryTabs"></div>
    </div>

    <div class="grid" id="productGrid"></div>
</div>

<footer>
    <p>© 2026 Velmora Luxury. Elevating Your Lifestyle.</p>
</footer>

<script>
const categories = ["All", "Smartwatch", "Audio", "Accessories", "Stationery", "Fashion", "Footwear", "Watches", "Electronics", "Beauty", "Skincare", "Fragrances", "Home Decor", "Kitchen", "Gadgets", "Gaming", "Fitness", "Travel", "Bags", "Jewelry", "Wellness"];

const products = [

    },
    {

    },
    {

    {

        affiliate: " https://amzn.to/47m9fmx" 
    },
    {
        id: 5,

        price: 999,
        cat: " Audio",
        img: " a3.jpg",
        reviews: "2,725",
        desc: "Wireless earbuds with custom EQ Bluetooth 5.4 and up to 70 hours playtime. Fast charging case and 50ms low latency mode for smooth gaming and powerful audio.",
        affiliate: " https://amzn.to/4rP6se1" 
    },
    {

    {

        affiliate: "https://amzn.to/4rVq54g" 
    }

    
];
    
       
const insights = {
    "Smartwatch": "Stay ahead of time with elite health tracking and seamless connectivity.",
    "Audio": "Experience studio-quality sound that transports you to another world.",
    "Accessories": "Define your class with minimal yet powerful details. Perfect craftsmanship.",
    "Stationery": "Turn every word into a legacy. Premium tools for visionary minds.",
    "Default": "Experience the pinnacle of luxury. Handpicked for quality and elegance."
};

function toggleWishlist(btn) {
    btn.classList.toggle('active');
    btn.innerHTML = btn.classList.contains('active') ? '❤️' : '🤍';
}

function renderGrid(data) {
    const grid = document.getElementById('productGrid');
    if (data.length === 0) {
        grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; padding:50px; opacity:0.5;">No products found.</p>`;
        return;
    }
    
    grid.innerHTML = data.map(p => {
        const message = insights[p.cat] || insights["Default"];
        
        // Related Products Logic: Filter same category, exclude current product, take 3
        let related = products.filter(r => r.cat === p.cat && r.name !== p.name).slice(0, 7);
        let relatedNames = related.length > 0 ? `<div class="related-tag">Similar: ${related.map(r => r.name).join(', ')}</div>` : "";

        return `
        <div class="card">
            <button class="wishlist-btn" onclick="toggleWishlist(this)">🤍</button>
            <img src="${p.img}" alt="${p.name}">
            <div class="card-content">
                <div class="smart-message">✨ ${message}</div>
                ${relatedNames}
                <div class="rating">⭐⭐⭐⭐⭐ (${p.reviews} reviews)</div>
                <h3>${p.name}</h3>
                <div class="price">₹${p.price.toLocaleString()}</div>
                <a href="${p.affiliate}" class="btn-buy" target="_blank">Buy Now</a>
            </div>
        </div>
    `}).join('');
}

let currentCat = "All";
function renderTabs() {
    const container = document.getElementById('categoryTabs');
    container.innerHTML = categories.map(c => `<div class="tab ${c === currentCat ? 'active' : ''}" onclick="setCategory('${c}')">${c}</div>`).join('');
}

function setCategory(cat) { currentCat = cat; renderTabs(); filterProducts(); }

function filterProducts() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const priceVal = document.getElementById('priceRange').value;
    const filtered = products.filter(p => {
        const matchesCat = (currentCat === "All" || p.cat === currentCat);
        const matchesSearch = p.name.toLowerCase().includes(term);
        let matchesPrice = true;
        if (priceVal !== "all") {
            const [min, max] = priceVal.split('-').map(Number);
            matchesPrice = max ? (p.price >= min && p.price <= max) : p.price >= min;
        }
        return matchesCat && matchesSearch && matchesPrice;
    });
    renderGrid(filtered);
}

document.getElementById('searchInput').addEventListener('input', filterProducts);
document.getElementById('priceRange').addEventListener('change', filterProducts);
renderTabs();
renderGrid(products);
</script>
</body>
</html>
