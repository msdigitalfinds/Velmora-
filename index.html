<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velmora Luxury | Premium Collections</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark: #0a0a0a; --gray: #1a1a1a; --white: #ffffff; --border: #333; }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--dark); color: var(--white); scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 5%; background: #000; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); }
        .logo { font-size: 24px; font-weight: bold; text-decoration: none; color: white; }
        .logo span { color: var(--gold); }
        
        input { padding: 12px 20px; border-radius: 25px; border: 1px solid #444; background: #111; color: #fff; outline: none; transition: 0.3s; font-size: 14px; width: 100%; box-sizing: border-box; }
        
        .hero { height: 30vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.unsplash.com/photo-1513584684374-8bdb74a9fe2f?w=1400'); background-size: cover; padding: 0 10%; border-bottom: 1px solid var(--gold); }
        .hero h1 { font-size: 1.8rem; color: var(--white); }
        
        .container { padding: 20px 5%; }
        .filter-section { margin-bottom: 25px; }
        
        .tabs { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tab { padding: 8px 18px; background: #1a1a1a; cursor: pointer; border-radius: 30px; border: 1px solid var(--border); white-space: nowrap; font-size: 12px; color: #ccc; }
        .tab.active { background: var(--gold); color: #000; font-weight: 600; }
        
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: #111; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); display: flex; flex-direction: column; }
        
        .card img { width: 100%; height: 160px; object-fit: cover; }
        .card-content { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .smart-message { font-size: 10px; background: rgba(212, 175, 55, 0.1); color: var(--gold); padding: 8px; border-radius: 4px; margin-bottom: 10px; line-height: 1.4; }
        .card-content h3 { font-size: 13px; margin: 5px 0; color: var(--white); min-height: 40px; }
        
        /* Related Products Section */
        .related-box { margin-top: 10px; padding-top: 10px; border-top: 1px solid #222; }
        .related-title { font-size: 10px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .related-item { font-size: 10px; color: #888; display: block; margin-bottom: 3px; text-decoration: none; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .btn-buy { display: block; background: var(--gold); color: #000; text-align: center; padding: 10px; text-decoration: none; font-weight: 600; border-radius: 8px; font-size: 12px; margin-top: 15px; }

        footer { text-align: center; padding: 30px; background: #000; font-size: 11px; color: #555; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo">Velmora <span>Luxury</span></a>

<footer>

    { id:30, name:"GUESS Headline Analog Watch", category:"smart watches", img:"aa10.jpg", desc:"Modern square dial and water resistant build.", affiliate:"https://amzn.to/4rn64lX " }

];

const insights = {
    "Smartwatch": "Stay ahead with elite tracking.",
    "Audio": "Experience studio-quality sound.",
    "Default": "Premium handpicked essentials."
};

function renderGrid(data) {
    const grid = document.getElementById('productGrid');
    if (data.length === 0) {
        grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; opacity:0.5;">No products found.</p>`;
        return;
    }
    
    grid.innerHTML = data.map(p => {
        const msg = insights[p.cat] || insights["Default"];
        
        // Find Related: Same category, different ID
        const related = products
            .filter(r => r.cat === p.cat && r.id !== p.id)
            .slice(0, 2); // Show top 2 related

        let relatedHTML = "";
        if(related.length > 0) {
            relatedHTML = `
                <div class="related-box">
                    <div class="related-title">You may also like:</div>
                    ${related.map(r => `<span class="related-item">• ${r.name}</span>`).join('')}
                </div>`;
        }

        return `
        <div class="card">
            <img src="${p.img}" alt="${p.name}">
            <div class="card-content">
                <div class="smart-message">✨ ${msg}</div>
                <h3>${p.name}</h3>
                ${relatedHTML}
                <a href="${p.affiliate}" class="btn-buy" target="_blank">View Details</a>
            </div>
        </div>`;
    }).join('');
}

let currentCat = "All";
function renderTabs() {
    const container = document.getElementById('categoryTabs');
    container.innerHTML = categories.map(c => `<div class="tab ${c === currentCat ? 'active' : ''}" onclick="setCategory('${c}')">${c}</div>`).join('');
}

function setCategory(cat) { currentCat = cat; renderTabs(); filterProducts(); }

function filterProducts() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const filtered = products.filter(p => {
        const matchesCat = (currentCat === "All" || p.cat === currentCat);
        const matchesSearch = p.name.toLowerCase().includes(term);
        return matchesCat && matchesSearch;
    });
    renderGrid(filtered);
}

document.getElementById('searchInput').addEventListener('input', filterProducts);
renderTabs();
renderGrid(products);
</script>
